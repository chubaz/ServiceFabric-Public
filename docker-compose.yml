services:
  proxy:
    build:
      context: .
      dockerfile: 1_proxy/Dockerfile
    depends_on:
      backend_api:
        condition: service_healthy
      core_flask_service:
        condition: service_healthy
      fastapi_core:
        condition: service_healthy
    volumes:
      - static_assets:/var/www/django-static:ro
    networks: [service_fabric_net]

  backend_api:
    build: ./2_backend_api
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_assets:/app/static
    networks: [service_fabric_net]
    expose: ["8000"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/healthz/', timeout=3)\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  db:
    image: postgres:15.8-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [service_fabric_net]
    expose: ["5432"]

  core_flask_service:
    build:
      context: .
      dockerfile: 5_core_services/flask_base/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - user_media:/app/user_media
    environment:
      SERVICE_CATALOG_PATH: /app/services_catalog
      USER_MEDIA_ROOT: /app/user_media
    networks: [service_fabric_net]
    expose: ["5000"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:5000/_healthz', timeout=3)\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  fastapi_core:
    build: ./5_core_services/fastapi_base
    depends_on:
      core_flask_service:
        condition: service_healthy
      backend_api:
        condition: service_healthy
    volumes:
      - vector_data:/app/user_media/embeddings
    environment:
      FLASK_SERVICE_URL: http://core_flask_service:5000
      DJANGO_SERVICE_URL: http://backend_api:8000
      VECTOR_STORAGE_PATH: /app/user_media/embeddings/chroma_core
    networks: [service_fabric_net]
    expose: ["8000"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health/', timeout=3)\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
  static_assets:
  user_media:
  vector_data:

networks:
  service_fabric_net:
    driver: bridge
