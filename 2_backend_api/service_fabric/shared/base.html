<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    </head>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        slate: { 850: '#151e2e' }, // Deep slate for backgrounds
                        amber: { 450: '#f59e0b' }  // Custom accent
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        body { font-family: 'Inter', sans-serif; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        /* Glassmorphism Utilities */
        .glass-nav {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Transition Utilities */
        .fade-enter { opacity: 0; transform: translateY(10px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: opacity 300ms, transform 300ms; }
        .fade-exit { opacity: 1; transform: translateY(0); }
        .fade-exit-active { opacity: 0; transform: translateY(-10px); transition: opacity 300ms, transform 300ms; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-slate-900 text-gray-300 antialiased flex flex-col min-h-screen overflow-hidden">

    <header class="fixed top-0 w-full z-[150] glass-nav transition-all duration-300" id="main-header">
        <nav class="container mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                
                <a href="/" class="flex items-center gap-3 cursor-pointer group hover:opacity-90 transition-opacity">
                    <div class="p-1.5 bg-gradient-to-br from-amber-500 to-orange-600 rounded-lg shadow-lg shadow-amber-500/20 group-hover:shadow-amber-500/40 transition-shadow">
                        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                        </svg>
                    </div>
                    <span class="text-lg font-bold text-white tracking-tight">Service<span class="text-amber-500">Fabric</span></span>
                </a>
                
                <div class="hidden md:flex items-center space-x-1 bg-white/5 p-1 rounded-full border border-white/5">
                    <a href="#" class="px-4 py-1.5 text-sm font-medium text-white bg-slate-800 rounded-full shadow-sm transition-all">Hub</a>
                    <a href="#" class="px-4 py-1.5 text-sm font-medium text-gray-400 hover:text-white hover:bg-white/5 rounded-full transition-all">Admin</a>
                    <a href="#" class="px-4 py-1.5 text-sm font-medium text-gray-400 hover:text-white hover:bg-white/5 rounded-full transition-all">API</a>
                </div>
                
                <div class="flex items-center gap-4">
                    <div id="user-status-display" class="hidden md:flex flex-col items-end text-right opacity-0 transition-opacity duration-500">
                        <span class="text-xs font-semibold text-white" id="user-name-el">Guest</span>
                        <span class="text-[10px] text-amber-500 uppercase tracking-wider" id="user-role-el">Viewer</span>
                    </div>
                    <button id="auth-toggle-btn" class="group relative inline-flex items-center justify-center px-4 py-1.5 text-xs font-bold uppercase tracking-wide text-white bg-slate-800 border border-slate-600 rounded-lg hover:bg-slate-700 hover:border-slate-500 transition-all focus:outline-none focus:ring-2 focus:ring-amber-500 focus:ring-offset-2 focus:ring-offset-slate-900">
                        Sign In
                    </button>
                </div>
            </div>
        </nav>
        
        <div class="border-t border-slate-800 bg-slate-800/50 backdrop-blur-sm h-12 relative z-40">
            <div class="container mx-auto px-4 sm:px-6 lg:px-8 h-full flex items-center justify-between">
                {% block ribbon_content %}
                <div class="text-xs text-gray-500 font-mono flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500"></span> System Operational
                </div>
                {% endblock %}
            </div>
        </div>
    </header>

    <main class="flex-grow relative pt-28 overflow-y-auto h-screen scroll-smooth">
        {% block content %}{% endblock %}
        
        <footer class="border-t border-slate-800 bg-slate-900/50 py-8 mt-12">
            <div class="container mx-auto px-4 text-center">
                <p class="text-xs text-slate-500">&copy; 2025 Service Fabric Inc. Base Layer v2.1</p>
                <div class="mt-2 flex justify-center space-x-4 text-xs text-slate-600">
                    <a href="#" class="hover:text-slate-400">Privacy</a>
                    <a href="#" class="hover:text-slate-400">Terms</a>
                    <a href="#" class="hover:text-slate-400">Status</a>
                </div>
            </div>
        </footer>
    </main>

    <script src="/static/apiClient.js"></script> 
    {% block scripts %}{% endblock %}
</body>
</html>
