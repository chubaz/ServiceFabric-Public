{% load static %}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    </head>
    
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <style type="text/tailwindcss">
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        /* Utility per nascondere elementi durante il caricamento HTMX */
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }
        .htmx-request.htmx-indicator { display: inline; }
    </style>
    
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-slate-900 text-gray-300 antialiased min-h-screen flex flex-col" hx-boost="true">
    <div id="toast-container" class="fixed top-5 right-5 z-50"></div>

    {% block layout %}{% endblock %}

    <script src="{% static 'apiClient.js' %}"></script>
    <script>
        // Configurazione HTMX per gestire CSRF token di Django
        document.body.addEventListener('htmx:configRequest', (event) => {
            event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
            // Nota: L'auth token viaggia via HttpOnly Cookie (vedi views.py)
        });
        
        // Gestione errori HTMX globale
        document.body.addEventListener('htmx:responseError', (event) => {
            alert("Errore di connessione o Server Error: " + event.detail.xhr.status);
        });
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
