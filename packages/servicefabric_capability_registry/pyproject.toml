[build-system]
requires = ["setuptools==80.9.0"]
build-backend = "setuptools.build_meta"

[project]
name = "servicefabric-capability-registry"
version = "0.1.0a1"
description = "Atomic static capability definition registry for ServiceFabric."
requires-python = ">=3.11,<3.12"
dependencies = []

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["servicefabric_capability_registry*"]
