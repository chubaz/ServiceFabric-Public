[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "servicefabric-release-readiness"
version = "0.1.0"
description = "Read-only foundation release readiness checks for ServiceFabric."
requires-python = ">=3.11"

[project.scripts]
servicefabric = "servicefabric_release_readiness.cli:main"

[tool.setuptools]
packages = ["servicefabric_release_readiness"]

[tool.setuptools.package-data]
servicefabric_release_readiness = ["foundation_release.json"]
