[build-system]
requires = ["setuptools==80.9.0"]
build-backend = "setuptools.build_meta"
[project]
name = "servicefabric-agent-harness"
version = "0.7.0a1"
requires-python = ">=3.11,<3.12"
dependencies = ["servicefabric-agentic-contracts"]
[tool.setuptools]
package-dir = {"" = "src"}
[tool.setuptools.packages.find]
where = ["src"]
