[build-system]
requires = ["setuptools==80.9.0"]
build-backend = "setuptools.build_meta"

[project]
name = "servicefabric-workspace"
version = "0.1.0a1"
description = "Deterministic workspace and application lifecycle layout authority for ServiceFabric."
requires-python = ">=3.11,<3.12"
dependencies = [
  "pyyaml==6.0.2",
]

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["servicefabric_workspace*"]
