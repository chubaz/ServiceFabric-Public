[build-system]
requires = ["setuptools==80.9.0"]
build-backend = "setuptools.build_meta"

[project]
name = "servicefabric-capability-distillation"
version = "0.10.0a1"
description = "Manifest-bounded capability candidate generation for ServiceFabric."
requires-python = ">=3.11,<3.12"
dependencies = [
  "servicefabric-distillation-contracts==0.10.0a1",
  "servicefabric-capability-model==0.1.0a1",
  "servicefabric-operation-model==0.1.0a1",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
