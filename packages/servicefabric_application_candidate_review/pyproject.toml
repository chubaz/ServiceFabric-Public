[build-system]
requires = ["setuptools==80.9.0"]
build-backend = "setuptools.build_meta"

[project]
name = "servicefabric-application-candidate-review"
version = "0.9.0a1"
description = "Read-only candidate review for ServiceFabric application factory lanes."
requires-python = ">=3.11,<3.12"
dependencies = [
  "servicefabric-agentic-contracts==0.7.0a1",
  "servicefabric-application-factory-contracts==0.9.0a1",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
