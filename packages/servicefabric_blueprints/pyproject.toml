[build-system]
requires = ["setuptools==80.9.0"]
build-backend = "setuptools.build_meta"

[project]
name = "servicefabric-blueprints"
version = "0.1.0a1"
description = "Reviewed application blueprint catalog for ServiceFabric module graphs."
requires-python = ">=3.11,<3.12"
dependencies = [
  "servicefabric-application-model==0.1.0a1",
  "servicefabric-framework-kits==0.1.0a1",
]

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["servicefabric_blueprints*"]
