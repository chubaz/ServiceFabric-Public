[build-system]
requires = ["setuptools==80.9.0"]
build-backend = "setuptools.build_meta"

[project]
name = "servicefabric-technique-policies"
version = "0.10.0a1"
description = "Deterministic reviewed technique-policy publication for ServiceFabric."
requires-python = ">=3.11,<3.12"
dependencies = [
  "servicefabric-distillation-contracts==0.10.0a1",
  "servicefabric-application-factory-contracts==0.9.0a1",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
