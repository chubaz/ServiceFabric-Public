[build-system]
requires = ["setuptools>=68,<76"]
build-backend = "setuptools.build_meta"

[project]
name = "servicefabric-mcp-projection"
version = "0.1.0a1"
requires-python = ">=3.11,<3.12"
dependencies = ["pydantic>=2.13,<3", "servicefabric-contracts==0.4.0a1"]

[tool.setuptools.packages.find]
where = ["src"]
