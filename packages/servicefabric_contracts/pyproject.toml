[build-system]
requires = ["setuptools==80.9.0"]
build-backend = "setuptools.build_meta"

[project]
name = "servicefabric-contracts"
version = "0.2.0a1"
description = "Framework-neutral canonical contracts for ServiceFabric resources."
readme = "README.md"
requires-python = ">=3.11,<3.12"
dependencies = ["pydantic>=2.13,<3"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
