[build-system]
requires = ["setuptools==80.9.0"]
build-backend = "setuptools.build_meta"

[project]
name = "servicefabric-langgraph-orchestration"
version = "0.8.0a1"
description = "Data-only dependency planning for ServiceFabric provider execution."
requires-python = ">=3.11,<3.12"
dependencies = [
  "servicefabric-agent-harness==0.7.0a1",
  "servicefabric-agentic-contracts==0.7.0a1",
  "servicefabric-agentic-orchestrator==0.7.0a1",
  "servicefabric-agentic-run-store==0.7.0a1",
  "servicefabric-agent-provider-contracts==0.8.0a1",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
