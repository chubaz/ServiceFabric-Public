[build-system]
requires = ["setuptools==80.9.0"]
build-backend = "setuptools.build_meta"

[project]
name = "servicefabric-application-model"
version = "0.1.0a1"
description = "Canonical module definitions, primitives, and application models for ServiceFabric."
requires-python = ">=3.11,<3.12"
dependencies = [
  "pyyaml==6.0.3",
]

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["servicefabric_application_model*"]
