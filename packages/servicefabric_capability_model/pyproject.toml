[build-system]
requires = ["setuptools==80.9.0"]
build-backend = "setuptools.build_meta"

[project]
name = "servicefabric-capability-model"
version = "0.1.0a1"
description = "Stable semantic capability declarations for ServiceFabric."
requires-python = ">=3.11,<3.12"
dependencies = ["pydantic>=2.13,<3"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
