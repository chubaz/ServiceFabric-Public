[build-system]
requires = ["setuptools==80.9.0"]
build-backend = "setuptools.build_meta"

[project]
name = "servicefabric-capability-mcp-projection"
version = "0.1.0a1"
description = "Availability-aware MCP candidates for registered ServiceFabric capabilities."
requires-python = ">=3.11,<3.12"
dependencies = [
  "servicefabric-capability-registry==0.1.0a1",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
