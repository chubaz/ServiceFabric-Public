[build-system]
requires = ["setuptools==80.9.0"]
build-backend = "setuptools.build_meta"

[project]
name = "servicefabric-builder"
version = "0.1.0a1"
description = "Bounded deterministic application builder for ServiceFabric."
requires-python = ">=3.11,<3.12"
dependencies = ["servicefabric-contracts==0.4.0a1"]

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["servicefabric_builder*"]
