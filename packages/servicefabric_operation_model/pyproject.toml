[build-system]
requires = ["setuptools==80.9.0"]
build-backend = "setuptools.build_meta"

[project]
name = "servicefabric-operation-model"
version = "0.1.0a1"
description = "Strict, deterministic ServiceFabric operation definitions."
requires-python = ">=3.11,<3.12"

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["servicefabric_operation_model*"]
