[build-system]
requires = ["setuptools==80.9.0"]
build-backend = "setuptools.build_meta"

[project]
name = "servicefabric-framework-kits"
version = "0.1.0a1"
description = "Deterministic framework kit adapters and static catalog for ServiceFabric."
requires-python = ">=3.11,<3.12"
dependencies = [
  "pyyaml==6.0.3",
  "servicefabric-application-model==0.1.0a1",
]

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["servicefabric_framework_kits*"]
