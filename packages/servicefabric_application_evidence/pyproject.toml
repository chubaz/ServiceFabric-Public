[build-system]
requires = ["setuptools==80.9.0"]
build-backend = "setuptools.build_meta"

[project]
name = "servicefabric-application-evidence"
version = "0.10.0a1"
description = "Manifest-bounded Wave-9 evidence collection for ServiceFabric distillation."
requires-python = ">=3.11,<3.12"
dependencies = [
  "servicefabric-agentic-contracts==0.7.0a1",
  "servicefabric-application-factory-contracts==0.9.0a1",
  "servicefabric-distillation-contracts==0.10.0a1",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
