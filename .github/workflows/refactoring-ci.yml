name: Refactoring CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  architecture-guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependency lock tooling
        run: python3 -m pip install pip-tools==7.5.3

      - name: Validate Python dependency locks
        run: python3 scripts/dependencies/check_python_locks.py --verify-compile

      - name: Run architecture guardrail script
        run: python3 scripts/architecture/check_legacy_patterns.py

      - name: Run architecture tests
        run: python3 -m unittest discover -s tests/architecture -v

  python-production-builds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create CI production environment
        run: |
          cat > .env.prod.ci <<'EOF'
          COMPOSE_PROJECT_NAME=service_fabric_ci
          SERVICEFABRIC_ENV_FILE=.env.prod.ci
          PROXY_PORT=8080
          DEBUG=0
          ALLOWED_HOSTS=ci.servicefabric.local
          SECRET_KEY=ci-django-secret-key-with-enough-length
          DJANGO_SECRET_KEY=ci-django-secret-key-with-enough-length
          POSTGRES_DB=servicefabric
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=ci-postgres-password-with-enough-length
          DATABASE_URL=postgresql://postgres:ci-postgres-password-with-enough-length@db:5432/servicefabric
          SERVICE_CATALOG_PATH=/app/services_catalog
          STATIC_ASSETS_PATH=/app/flask_static
          FLASK_SERVICE_URL=http://core_flask_service:5000
          DJANGO_SERVICE_URL=http://backend_api:8000
          DJANGO_JWT_ISSUER=https://identity.servicefabric.local/servicefabric
          DJANGO_JWT_AUDIENCE=servicefabric-production
          DJANGO_JWT_TOKEN_TYPE=access
          AUTH_COOKIE_SECURE=true
          AUTH_COOKIE_SAMESITE=Lax
          AUTH_COOKIE_PATH=/
          CREDENTIAL_STORE_ENVIRONMENT=production
          CREDENTIAL_STORE_BACKEND=disabled
          FLASK_ENVIRONMENT=production
          ENABLE_DYNAMIC_SERVICE_IMPORTS=false
          ENABLE_GENERATED_SERVICE_IMPORTS=false
          ENABLE_LEGACY_FAAS_EXECUTION=false
          ENABLE_INTERNAL_RELOAD=false
          ENABLE_DEBUG_ROUTES=false
          LEGACY_CATALOG_ALLOWLIST=
          MAX_UPLOAD_BYTES=10485760
          UPLOAD_ALLOWED_EXTENSIONS=csv,json,jpeg,jpg,pdf,png,txt
          FABRIC_ENVIRONMENT=production
          JWT_SECRET_KEY=ci-fastapi-secret-key-with-at-least-32-characters
          JWT_ALGORITHM=HS256
          JWT_ISSUER=https://identity.servicefabric.local/servicefabric
          JWT_AUDIENCE=servicefabric-fastapi
          JWT_TOKEN_TYPE=fabric_internal
          CORS_ALLOWED_ORIGINS=https://servicefabric.local
          CORS_ALLOW_CREDENTIALS=true
          MAX_REQUEST_BODY_BYTES=1048576
          MAX_VECTOR_DOCUMENTS=100
          MAX_VECTOR_DOCUMENT_CHARS=20000
          MAX_VECTOR_METADATA_BYTES=8192
          MAX_VECTOR_TOP_K=25
          EOF

      - name: Build Python production images
        run: |
          SERVICEFABRIC_ENV_FILE=.env.prod.ci docker compose \
            --env-file .env.prod.ci \
            -f docker-compose.yml \
            -f docker-compose.prod.yml \
            build backend_api core_flask_service fastapi_core

      - name: Validate installed Python dependencies
        run: |
          SERVICEFABRIC_ENV_FILE=.env.prod.ci docker compose \
            --env-file .env.prod.ci \
            -f docker-compose.yml \
            -f docker-compose.prod.yml \
            run --rm --no-deps backend_api python -m pip check
          SERVICEFABRIC_ENV_FILE=.env.prod.ci docker compose \
            --env-file .env.prod.ci \
            -f docker-compose.yml \
            -f docker-compose.prod.yml \
            run --rm --no-deps core_flask_service python -m pip check
          SERVICEFABRIC_ENV_FILE=.env.prod.ci docker compose \
            --env-file .env.prod.ci \
            -f docker-compose.yml \
            -f docker-compose.prod.yml \
            run --rm --no-deps fastapi_core python -m pip check
