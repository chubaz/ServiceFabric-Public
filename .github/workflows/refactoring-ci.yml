name: Refactoring CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  agent-execution-foundation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 scripts/agent/validate_workplans.py
      - run: python3 -m unittest discover -s tests/agent -v
      - run: python3 scripts/agent/preflight.py --milestone e0-00 --mode ci
      - run: python3 scripts/agent/verify.py --milestone e0-00
      - run: python3 scripts/architecture/check_legacy_patterns.py

  architecture-guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependency lock tooling
        run: python3 -m pip install pip-tools==7.5.3

      - name: Validate Python dependency locks
        run: python3 scripts/dependencies/check_python_locks.py --verify-compile

      - name: Run architecture guardrail script
        run: python3 scripts/architecture/check_legacy_patterns.py

      - name: Run architecture tests
        run: python3 -m unittest discover -s tests/architecture -v

  canonical-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate committed dependency locks
        run: python3 scripts/dependencies/check_python_locks.py

      - name: Install locked contract test dependencies
        run: python3 -m pip install -r packages/servicefabric_contracts/requirements/test.lock

      - name: Install contract package
        run: python3 -m pip install --no-deps -e packages/servicefabric_contracts

      - name: Install ServiceFabric packages
        run: |
          python3 -m pip install --no-build-isolation --no-deps -e packages/servicefabric_runtime
          python3 -m pip install --no-build-isolation --no-deps -e packages/servicefabric_mcp_client
          python3 -m pip install --no-build-isolation --no-deps -e packages/servicefabric_langchain
          python3 -m pip install --no-build-isolation --no-deps -e packages/servicefabric_builder
          python3 -m pip install --no-build-isolation --no-deps -e packages/servicefabric_artifacts
          python3 -m pip install --no-build-isolation --no-deps -e packages/servicefabric_capsules
          python3 -m pip install --no-build-isolation --no-deps -e packages/servicefabric_governance
          python3 -m pip install --no-build-isolation --no-deps -e packages/servicefabric_operations
          python3 -m pip install --no-build-isolation --no-deps -e services/tool_runtime
          python3 -m pip install --no-build-isolation --no-deps -e services/application_builder
          python3 -m pip install --no-build-isolation --no-deps -e services/application_host
          python3 -m pip install --no-build-isolation --no-deps -e services/capsule_host
          python3 -m pip install --no-build-isolation --no-deps -e services/governance_operations
          python3 -m pip install --no-build-isolation --no-deps -e packages/servicefabric_mcp_projection
          python3 -m pip install --no-build-isolation --no-deps -e packages/servicefabric_mcp_harness
          python3 -m pip install --no-build-isolation --no-deps -e services/mcp_gateway
          python3 -m pip install --no-build-isolation --no-deps -e clients/python
          python3 -m pip install fastapi==0.139.0 uvicorn==0.51.0

      - name: Verify V3 package imports
        run: |
          python3 - <<'PY'
          import servicefabric_contracts
          import servicefabric_governance
          import servicefabric_operations
          import servicefabric_governance_service
          import servicefabric_mcp_projection
          import servicefabric_mcp_harness
          import servicefabric_mcp_gateway

          print("ServiceFabric V3 package imports passed.")
          PY

      - name: Run contract tests
        run: python3 -m unittest discover -s packages/servicefabric_contracts/tests -v

      - name: Check deterministic schema snapshots
        run: python3 scripts/contracts/check_schema_snapshots.py

      - name: Check legacy migration snapshots
        run: |
          python3 scripts/contracts/inventory_legacy_manifests.py --check
          python3 scripts/contracts/check_legacy_translation_snapshots.py

      - name: Build contract distributions
        run: python3 -m build --outdir /tmp/servicefabric-contract-build packages/servicefabric_contracts

      - name: Check installed dependency metadata
        run: python3 -m pip check

      - name: Run contract package architecture boundaries
        run: python3 -m unittest discover -s tests/architecture -p 'test_contract_package_boundaries.py' -v

      - name: Run tool lifecycle architecture boundaries
        run: python3 -m unittest discover -s tests/architecture -p 'test_tool_contract_boundaries.py' -v

      - name: Run invocation contract architecture boundaries
        run: python3 -m unittest discover -s tests/architecture -p 'test_invocation_contract_boundaries.py' -v

      - name: Run legacy translation architecture boundaries
        run: python3 -m unittest discover -s tests/architecture -p 'test_legacy_translation_boundaries.py' -v

      - name: Run immutable application builder tests
        run: |
          python3 -m unittest discover -s tests/runtime -v
          python3 -m unittest discover -s tests/integrations -v
          python3 -m unittest discover -s tests/builder -v
          python3 -m unittest discover -s tests/artifacts -v
          python3 -m unittest discover -s tests/applications -v

      - name: Run V2-00 committed verification
        run: python3 scripts/agent/verify.py --milestone v2-00 --phase completion

      - name: Run V2-01 committed verification
        run: python3 scripts/agent/verify.py --milestone v2-01 --phase completion

      - name: Run V3-00 completion verification
        run: python3 scripts/agent/verify.py --milestone v3-00 --phase completion

      - name: Run V4-00 completion verification
        run: python3 scripts/agent/verify.py --milestone v4-00 --phase completion

      - name: Run application workspace package tests
        run: python3 -m unittest discover -s packages/servicefabric_workspace/tests -v

      - name: Run application workspace journeys
        run: python3 -m unittest discover -s tests/workspace -v

      - name: Run application model contract tests
        run: python3 -m unittest discover -s tests/modules -v

      - name: Run framework kits planning tests
        run: python3 -m unittest discover -s tests/framework_kits -v

      - name: Run workspace architecture boundaries
        run: |
          python3 -m unittest \
            tests.architecture.test_workspace_boundaries \
            tests.architecture.test_legacy_application_paths \
            -v

      - name: Run existing local UX regressions
        run: python3 -m unittest discover -s tests/local_ux -v

      - name: Run AP-01A hosting baseline
        run: python3 -m unittest tests.ap_01a.test_hosting_baseline -v

      - name: Run AP-01A installed CLI acceptance
        run: python3 -m unittest discover -s tests/ap_01a -v

  python-production-builds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create CI production environment
        run: |
          cat > .env.prod.ci <<'EOF'
          COMPOSE_PROJECT_NAME=service_fabric_ci
          SERVICEFABRIC_ENV_FILE=.env.prod.ci
          PROXY_PORT=8080
          DEBUG=0
          ALLOWED_HOSTS=ci.servicefabric.local
          SECRET_KEY=ci-django-secret-key-with-enough-length
          DJANGO_SECRET_KEY=ci-django-secret-key-with-enough-length
          POSTGRES_DB=servicefabric
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=ci-postgres-password-with-enough-length
          DATABASE_URL=postgresql://postgres:ci-postgres-password-with-enough-length@db:5432/servicefabric
          SERVICE_CATALOG_PATH=/app/services_catalog
          STATIC_ASSETS_PATH=/app/flask_static
          FLASK_SERVICE_URL=http://core_flask_service:5000
          DJANGO_SERVICE_URL=http://backend_api:8000
          DJANGO_JWT_ISSUER=https://identity.servicefabric.local/servicefabric
          DJANGO_JWT_AUDIENCE=servicefabric-production
          DJANGO_JWT_TOKEN_TYPE=access
          AUTH_COOKIE_SECURE=true
          AUTH_COOKIE_SAMESITE=Lax
          AUTH_COOKIE_PATH=/
          CREDENTIAL_STORE_ENVIRONMENT=production
          CREDENTIAL_STORE_BACKEND=disabled
          FLASK_ENVIRONMENT=production
          ENABLE_DYNAMIC_SERVICE_IMPORTS=false
          ENABLE_GENERATED_SERVICE_IMPORTS=false
          ENABLE_LEGACY_FAAS_EXECUTION=false
          ENABLE_INTERNAL_RELOAD=false
          ENABLE_DEBUG_ROUTES=false
          LEGACY_CATALOG_ALLOWLIST=
          MAX_UPLOAD_BYTES=10485760
          UPLOAD_ALLOWED_EXTENSIONS=csv,json,jpeg,jpg,pdf,png,txt
          FABRIC_ENVIRONMENT=production
          JWT_SECRET_KEY=ci-fastapi-secret-key-with-at-least-32-characters
          JWT_ALGORITHM=HS256
          JWT_ISSUER=https://identity.servicefabric.local/servicefabric
          JWT_AUDIENCE=servicefabric-fastapi
          JWT_TOKEN_TYPE=fabric_internal
          CORS_ALLOWED_ORIGINS=https://servicefabric.local
          CORS_ALLOW_CREDENTIALS=true
          MAX_REQUEST_BODY_BYTES=1048576
          MAX_VECTOR_DOCUMENTS=100
          MAX_VECTOR_DOCUMENT_CHARS=20000
          MAX_VECTOR_METADATA_BYTES=8192
          MAX_VECTOR_TOP_K=25
          EOF

      - name: Build Python production images
        run: |
          SERVICEFABRIC_ENV_FILE=.env.prod.ci docker compose \
            --env-file .env.prod.ci \
            -f docker-compose.yml \
            -f docker-compose.prod.yml \
            build backend_api core_flask_service fastapi_core

      - name: Validate installed Python dependencies
        run: |
          SERVICEFABRIC_ENV_FILE=.env.prod.ci docker compose \
            --env-file .env.prod.ci \
            -f docker-compose.yml \
            -f docker-compose.prod.yml \
            run --rm --no-deps backend_api python -m pip check
          SERVICEFABRIC_ENV_FILE=.env.prod.ci docker compose \
            --env-file .env.prod.ci \
            -f docker-compose.yml \
            -f docker-compose.prod.yml \
            run --rm --no-deps core_flask_service python -m pip check
          SERVICEFABRIC_ENV_FILE=.env.prod.ci docker compose \
            --env-file .env.prod.ci \
            -f docker-compose.yml \
            -f docker-compose.prod.yml \
            run --rm --no-deps fastapi_core python -m pip check

      - name: Run capsule tests
        run: |
          python3 -m unittest discover -s tests/capsules -v
          python3 -m unittest discover \
            -s tests/architecture \
            -p 'test_capsule_host_boundaries.py' \
            -v
