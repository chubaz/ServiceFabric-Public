# hidden /1_proxy/conf.d/default.conf
# Lorenzo


upstream django_server {
    server backend_api:8000;
}
upstream flask_core_server {
    server core_flask_service:5000; 
}

upstream fastapi_core_server {
    server fastapi_core:8000; 
}

server {
    client_max_body_size 50M;
    listen 80;
    server_name localhost;
    
    location /static/ {
        alias /static/;
    }

    location /api/ {
        proxy_pass http://django_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /api/v1/ {
        proxy_pass http://fastapi_core_server/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /api/v1;
        
        # WebSocket Support Headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    location /admin/ {
        proxy_pass http://django_server;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
    
    location ^~ /app/core {
        rewrite ^/app/core/(.*) /$1 break;
        proxy_pass http://flask_core_server;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tell Flask about the external prefix
        proxy_set_header X-Forwarded-Prefix /app/core;
        proxy_set_header X-Script-Name /app/core;

        proxy_redirect off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }
    
    # --- ROUTING PER IL FRONTEND (main.html) ---
    # Qualsiasi altra richiesta (es. "/") viene gestita qui.
    location / {
        root /static;
        try_files /main-3.html =404; # Serve main.html
        
        
       
        # Se vogliamo che sia Django a servire la pagina principale:
        # proxy_pass http://django_server;
        # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # proxy_set_header Host $host;
        # proxy_redirect off;
    }

    # --- ROUTING DINAMICO PER I SERVIZI FLASK ---
    # (Questo è un placeholder che T5 riempirà)
    #
    # Nginx caricherà automaticamente ogni file .conf
    # presente nella cartella /etc/nginx/conf.d/
    #
    # Il "Generatore" (T5) creerà file come 'my-data-app.conf'
    # in questa cartella, che conterranno:
    #
    # location /app/my-data-app/ {
    #   proxy_pass http://my-data-app:8001;
    #   ...
    # }
}

# --- Server Block per HTTPS (SSL/TLS) ---
# Questo blocco gestisce le connessioni sicure sulla porta 443.
server {
    client_max_body_size 50M;
    # Ascolta sulla porta 443 e abilita SSL.
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name proxy.dryfus.one;

    # --- Percorsi dei Certificati SSL ---
    # NOTA: Devi generare questi file (es. con openssl) e montarli
    # nel container tramite docker-compose.yml.
    ssl_certificate     /etc/ssl/cert.pem;
    ssl_certificate_key /etc/ssl/key.key;

    # Le location sono identiche al blocco HTTP, poiché la logica di routing
    # non cambia.

     # --- ROUTING PER I FILE STATICI ---
    # Serve file come /main.html, .css, .js
    # Nginx è molto più veloce di Django a servire file statici.
    location /static/ {
