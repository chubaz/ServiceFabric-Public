resolver 127.0.0.11 ipv6=off valid=10s;

server {
    listen 8080;
    server_name _;
    client_max_body_size 10m;
    server_tokens off;

    set $django_upstream backend_api:8000;
    set $flask_upstream core_flask_service:5000;
    set $fastapi_upstream fastapi_core:8000;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-XSS-Protection "0" always;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /static/ {
        alias /var/www/django-static/;
        access_log off;
    }

    location /catalog/ {
        alias /usr/share/nginx/html/catalog/;
        try_files $uri =404;
        access_log off;
    }

    location /api/v1/ {
        rewrite ^/api/v1/(.*)$ /$1 break;
        proxy_pass http://$fastapi_upstream;
    
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /api/v1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /admin/ {
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    location ^~ /app/core/ {
        rewrite ^/app/core/(.*) /$1 break;
        proxy_pass http://$flask_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /app/core;
        proxy_set_header X-Script-Name /app/core;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = / {
        rewrite ^ /static/main-2.html last;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html =404;
    }
}
