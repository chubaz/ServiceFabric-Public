# Configurazione del reverse proxy
# /service-fabric-project/1_proxy/nginx.conf

# Definisce i "server" a cui Nginx può inoltrare il traffico.
# I nomi (backend_api, db) sono risolti automaticamente da Docker
# agli IP interni dei container.
upstream django_server {
    server backend_api:8000;
}

server {
    listen 80;
    server_name localhost; # O il tuo dominio
    client_max_body_size 50M;

    # --- ROUTING PER I FILE STATICI ---
    # Serve file come /main.html, .css, .js
    # Nginx è molto più veloce di Django a servire file statici.
    location /static/ {
        alias /static/; # Legge dal volume 'static_volume'
    }

    # --- ROUTING PER LE API DJANGO ---
    # Qualsiasi richiesta che inizia con /api/ o /admin/
    # viene inoltrata al server Django (backend_api:8000).
    location /api/ {
        proxy_pass http://django_server; # Inoltra a 'upstream django_server'
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }
    location /admin/ {
        proxy_pass http://django_server;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # --- ROUTING PER IL FRONTEND (main.html) ---
    # Qualsiasi altra richiesta (es. "/") viene gestita qui.
    location / {
        # Per ora, serviamo main.html direttamente.
        # In futuro, potremmo reindirizzare a /static/main.html o
        # fare il proxy_pass a Django per una TemplateView protetta.
        root /static;
        try_files /main.html =404; # Serve main.html
        
        
       
        # Se vogliamo che sia Django a servire la pagina principale:
        # proxy_pass http://django_server;
        # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # proxy_set_header Host $host;
        # proxy_redirect off;
    }

    # --- ROUTING DINAMICO PER I SERVIZI FLASK ---
    # (Questo è un placeholder che T5 riempirà)
    #
    # Nginx caricherà automaticamente ogni file .conf
    # presente nella cartella /etc/nginx/conf.d/
    #
    # Il "Generatore" (T5) creerà file come 'my-data-app.conf'
    # in questa cartella, che conterranno:
    #
    # location /app/my-data-app/ {
    #   proxy_pass http://my-data-app:8001;
    #   ...
    # }
}