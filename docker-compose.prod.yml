services:
  proxy:
    ports: ["${PROXY_PORT:?PROXY_PORT is required}:8080"]
    read_only: true
    tmpfs: [/tmp, /var/cache/nginx, /var/run]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
    stop_grace_period: 20s

  backend_api:
    env_file: ["${SERVICEFABRIC_ENV_FILE:?Set SERVICEFABRIC_ENV_FILE}"]
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/healthz/', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3
    stop_grace_period: 30s

  db:
    env_file: ["${SERVICEFABRIC_ENV_FILE:?Set SERVICEFABRIC_ENV_FILE}"]
    security_opt: [no-new-privileges:true]
    stop_grace_period: 60s

  core_flask_service:
    env_file: ["${SERVICEFABRIC_ENV_FILE:?Set SERVICEFABRIC_ENV_FILE}"]
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5000/_healthz >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
    stop_grace_period: 30s

  fastapi_core:
    env_file: ["${SERVICEFABRIC_ENV_FILE:?Set SERVICEFABRIC_ENV_FILE}"]
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health/', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3
    stop_grace_period: 30s
