<div class="space-y-8 animate-in fade-in duration-500">
    <div class="flex justify-between items-end">
        <div>
            <h2 class="text-3xl font-black text-slate-800 tracking-tight">Main Dashboard</h2>
            <p class="text-sm text-slate-500 font-medium">Monitoraggio dei cluster di memoria attivi.</p>
        </div>
        <div class="bg-emerald-500/10 text-emerald-600 px-3 py-1 rounded-full text-[10px] font-black uppercase border border-emerald-500/20">
            Nodo Operativo
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        {% for item in items %}
            <div class="p-6 bg-white rounded-3xl border border-slate-100 shadow-sm hover:shadow-md transition-all group">
                <div class="text-lg font-bold text-slate-700 mb-1">{{ item.title }}</div>
                <div class="text-xs text-slate-400 font-mono italic">Creato: {{ item.created_at }}</div>
            </div>
        {% else %}
            <div class="col-span-full py-20 text-center border-2 border-dashed border-slate-200 rounded-[3rem]">
                <p class="text-slate-400 font-bold uppercase tracking-widest text-sm">Nessun dato trovato nella memoria locale</p>
            </div>
        {% endfor %}
    </div>
</div>
