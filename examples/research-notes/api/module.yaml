apiVersion: servicefabric.local/v1
kind: ApplicationModule
metadata:
  id: notes-api
  version: 0.2.0
spec:
  primitive: service
  kit: fastapi-service @ServiceFabric/portfolio/applications/revisions/examples.research-notes-0.2.0.json
  source: examples/research-notes/api
  provides:
    - id: notes-api
      type: http
      protocol: http
  requires:
    interfaces:
      - id: notes-domain
    resources:
      - id: notes-db
        type: sqlite
        scope: application
  lifecycle:
    startAfter:
      - notes-db
    readiness:
      type: http
      path: /health/ready
    shutdown:
      timeoutSeconds: 10
  resourceExpectations:
    memoryMiB: 256
    cpuCores: 0.25
