<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Research Notes</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <h1>Research Notes</h1>
      <p>Capture and search notes through the Research Notes API.</p>
      <form id="create-note">
        <label>Title <input id="title" required maxlength="200"></label>
        <label>Body <textarea id="body" required maxlength="100000"></textarea></label>
        <button type="submit">Save note</button>
      </form>
      <label>Search <input id="query" type="search" placeholder="Search notes"></label>
      <p id="feedback" role="status"></p>
      <ol id="notes" aria-live="polite"></ol>
    </main>
    <script src="app.js"></script>
  </body>
</html>
